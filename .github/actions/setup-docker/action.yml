---
name: "Setup Docker"

inputs:
  os:
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup Docker
      if: inputs.os != 'macos-latest'
      uses: docker/setup-docker-action@v5
    - name: Setup Docker (Macos)
      if: inputs.os == 'macos-latest'
      uses: douglascamata/setup-docker-macos-action@v1.0.1
      with:
        lima: v1.2.1
        colima: v0.9.1
        colima-network-address: false
