---
name: "Init"
runs:
  using: "composite"
  steps:
    - name: Show Info
      run: echo "Triggered by ${{ github.event_name }} by ${{ github.actor }}"
      shell: bash
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.24"
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.4"
