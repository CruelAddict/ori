---
name: Github pipeline
on: [push]
jobs:
  init:
    runs-on: macos-latest
    steps:
      - name: Download Registry
        uses: actions/checkout@v4
      - uses: ./.github/actions/init
      - uses: ./.github/actions/make
        with:
          action: build
      - uses: ./.github/actions/make
        with:
          action: test
